<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ค้นหาวัคซีน</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
        body { 
            font-family: 'Kanit', sans-serif; 
            padding: 15px; 
            background-color: #F0F8FF; /* สีพื้นหลังโทนฟ้าอ่อน */
            margin: 0;
        }
        h2 {
            color: #0056b3; /* สีหัวข้อหลัก (น้ำเงิน) */
            text-align: center;
            margin-top: 10px;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            font-size: 16px; 
            border: 2px solid #add8e6; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: #0056b3; /* สีขอบช่องค้นหาเวลาแตะพิมพ์ */
        }
        .result-item { 
            background: white; 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 10px; 
            border-left: 6px solid #28a745; /* แถบสีเขียวด้านซ้ายของแต่ละรายการ */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            cursor: pointer; 
            transition: all 0.2s ease-in-out;
        }
        .result-item:active { 
            background: #e1f5fe; /* สีพื้นหลังเวลาเอานิ้วกด */
            transform: scale(0.98); /* ย่อขนาดลงนิดนึงเวลาให้ดูเหมือนปุ่มโดนกด */
        }
        .vaccine-name { 
            font-weight: bold; 
            font-size: 16px; 
            color: #333; 
        }
        .vaccine-details { 
            font-size: 14px; 
            color: #666; 
            margin-top: 4px; 
        }
        #loading { 
            text-align: center; 
            color: #0056b3; 
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h2>ค้นหาวัคซีน 💉</h2>
    <input type="text" id="searchInput" placeholder="พิมพ์ชื่อวัคซีน อาการ หรือคีย์เวิร์ด..." onkeyup="searchVaccine()">
    
    <div id="loading">กำลังโหลดข้อมูล...</div>
    <div id="resultList"></div>

    <script>
        // 1. ใส่ Web App URL ของคุณที่ได้จาก GAS
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzyEPmiANzgid40gp4sYPUx8zYKIH1B8imdKDDZMt3uuXNYIEP0cXZtg5Za58kLjd-E/exec";
        let vaccineData = [];

        // 2. เริ่มต้น LIFF (เดี๋ยวเราจะเอา LIFF ID มาใส่ทีหลัง)
        async function initializeLiff() {
            try {
                await liff.init({ liffId: "2009191617-wUZ6OjPp" });
            } catch (err) {
                console.error('LIFF Initialization failed', err);
            }
        }

        // 3. ดึงข้อมูลจาก Google Sheet ทันทีที่เปิดหน้าเว็บ
        async function fetchData() {
            try {
                const response = await fetch(GAS_URL);
                vaccineData = await response.json();
                document.getElementById('loading').style.display = 'none';
                displayResults(vaccineData); // โชว์ทั้งหมดก่อน
            } catch (error) {
                document.getElementById('loading').innerText = "เกิดข้อผิดพลาดในการโหลดข้อมูล";
            }
        }

        // 4. ฟังก์ชันค้นหา (จับจาก Keywords)
        function searchVaccine() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filteredData = vaccineData.filter(item => item.keywords.includes(query));
            displayResults(filteredData);
        }

        // 5. แสดงผลลัพธ์
        function displayResults(data) {
            const list = document.getElementById('resultList');
            list.innerHTML = "";
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `<div class="vaccine-name">${item.vaccine}</div><div class="vaccine-details">${item.details}</div>`;
                // เมื่อกดที่รายการ ให้ส่งชื่อวัคซีนกลับไปที่แชท
                div.onclick = () => sendToLine(item.vaccine);
                list.appendChild(div);
            });
        }

        // 6. ส่งข้อความกลับเข้าแชท LINE
        function sendToLine(vaccineName) {
            if (liff.isLoggedIn() && liff.isInClient()) {
                liff.sendMessages([
                    { type: 'text', text: vaccineName } // ส่งชื่อวัคซีนกลับไปเป็นข้อความ
                ]).then(() => {
                    liff.closeWindow(); // ปิดหน้าต่าง LIFF ทันทีเมื่อส่งเสร็จ
                }).catch((err) => {
                    console.error('Error sending message:', err);
                });
            } else {
                alert("คุณไม่ได้เปิดผ่านแอป LINE\nข้อมูลที่เลือกคือ: " + vaccineName);
            }
        }

        // โหลดทุกอย่างเมื่อเปิดหน้า
        initializeLiff();
        fetchData();
    </script>
</body>

</html>
