<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ค้นหาวัคซีน</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; padding: 15px; background-color: #F0F8FF; margin: 0; }
        h2 { color: #0056b3; text-align: center; margin-top: 10px; }
        input { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #add8e6; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #0056b3; }
        .result-item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; border-left: 6px solid #28a745; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; transition: all 0.2s ease-in-out; }
        .result-item:active { background: #e1f5fe; transform: scale(0.98); }
        .vaccine-name { font-weight: bold; font-size: 16px; color: #333; }
        .vaccine-details { font-size: 14px; color: #666; margin-top: 4px; }
        #loading { text-align: center; color: #0056b3; font-weight: bold; margin-top: 20px; }
        .error-text { color: red; }
    </style>
</head>
<body>

    <h2>ค้นหาวัคซีน 💉</h2>
    <input type="text" id="searchInput" placeholder="พิมพ์ชื่อวัคซีน อาการ หรือคีย์เวิร์ด..." onkeyup="searchVaccine()">
    
    <div id="loading">กำลังโหลดข้อมูล...</div>
    <div id="resultList"></div>

    <script>
        // ใช้ API ของ Vercel แทน GAS
        const API_URL = "/api/search";
        let vaccineData = [];

        // 1. นำ LIFF ID ของคุณมาใส่ตรงนี้นะคะ
        const MY_LIFF_ID = "ใส่_LIFF_ID_ของคุณที่นี่"; 

        async function initializeLiff() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
            } catch (err) {
                console.error('LIFF Initialization failed', err);
            }
        }

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // เช็คว่า Vercel ส่ง Error กลับมาไหม
                if (data.error) {
                    document.getElementById('loading').innerHTML = `<span class="error-text">❌ ระบบขัดข้อง: ${data.error}</span>`;
                    return;
                }
                
                vaccineData = data;
                document.getElementById('loading').style.display = 'none';
                displayResults(vaccineData); 
            } catch (error) {
                document.getElementById('loading').innerHTML = '<span class="error-text">❌ เกิดข้อผิดพลาดในการโหลดข้อมูล (ติดต่อ API ไม่ได้)</span>';
            }
        }

        function searchVaccine() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filteredData = vaccineData.filter(item => item.keywords && item.keywords.includes(query));
            displayResults(filteredData);
        }

        function displayResults(data) {
            const list = document.getElementById('resultList');
            list.innerHTML = "";
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `<div class="vaccine-name">${item.vaccine}</div><div class="vaccine-details">${item.details}</div>`;
                div.onclick = () => sendToLine(item.vaccine, item.target);
                list.appendChild(div);
            });
        }

        function sendToLine(vaccineName, target) {
            let targetText = "";
            let targetLower = target ? target.toLowerCase() : "";
            
            if (targetLower === "adult") {
                targetText = "ผู้ใหญ่";
            } else if (targetLower === "children") {
                targetText = "เด็ก"; 
            } else if (targetLower === "general") {
                targetText = "เด็ก-ผู้ใหญ่";
            }

            let finalMessage = targetText !== "" ? `${vaccineName} ${targetText}` : vaccineName;

            if (liff.isLoggedIn() && liff.isInClient()) {
                liff.sendMessages([ { type: 'text', text: finalMessage } ])
                .then(() => { liff.closeWindow(); })
                .catch((err) => { console.error('Error sending message:', err); });
            } else {
                alert("คุณไม่ได้เปิดผ่านแอป LINE\\nข้อมูลที่เลือกคือ: " + finalMessage);
            }
        }

        initializeLiff();
        fetchData();
    </script>
</body>
</html>
